<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avances — APTTUR</title>
  <meta name="description" content="Avances, reuniones y gestiones de APTTUR, la Asociación Peruana de Transporte Turístico." />

  <!-- CSS -->
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/decorations.css" />
  <link rel="stylesheet" href="css/navbar.css" />
  <link rel="stylesheet" href="css/footer.css" />
  <link rel="stylesheet" href="css/noticias.css" />
  <link rel="stylesheet" href="css/asistente.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>

  <!-- NAVBAR -->
  <header id="main-header"></header>

  <main>
    <section class="section-noticias" aria-labelledby="noticias-title">
      <!-- Watermark Pattern -->
      <div class="decoration-container" aria-hidden="true">
        <div class="wm-ring-tr-1"></div>
        <div class="wm-ring-tr-2 decoration-md-only"></div>
        <div class="wm-ring-tr-3 decoration-lg-only"></div>
        <div class="wm-ring-bl-1"></div>
        <div class="wm-ring-bl-2 decoration-md-only"></div>
        <div class="wm-ring-bl-3 decoration-lg-only"></div>
        <div class="wm-ring-center-1 decoration-md-only"></div>
        <div class="wm-ring-center-2 decoration-lg-only"></div>
        <div class="wm-ring-a decoration-md-only"></div>
        <div class="wm-ring-b decoration-md-only"></div>
        <div class="wm-glow-1"></div>
        <div class="wm-glow-2 decoration-md-only"></div>
        <div class="wm-glow-3 decoration-md-only"></div>
        <div class="wm-square-1 decoration-md-only"></div>
        <div class="wm-square-2 decoration-md-only"></div>
        <svg class="wm-dots-grid decoration-md-only" xmlns="http://www.w3.org/2000/svg"><defs><pattern id="dots-noticias" width="40" height="40" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1.5" fill="#00A85A"/></pattern></defs><rect width="100%" height="100%" fill="url(#dots-noticias)"/></svg>
        <div class="wm-blob-1"></div>
        <div class="wm-blob-2 decoration-md-only"></div>
      </div>
      <div class="container noticias-container" id="noticias-root"></div>
    </section>
  </main>

  <!-- FOOTER -->
  <footer id="main-footer"></footer>

  <!-- Scripts -->
  <script src="js/main.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/noticias.js"></script>
</body>
</html>
